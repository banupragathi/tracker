<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toner Tracker — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink: #0d0d0d;
      --ink-2: #1a1a1a;
      --surface: #f4f1eb;
      --accent: #e8500a;
      --accent-2: #f7c948;
      --muted: #6b6b6b;
      --border: #d4cfc6;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(232,80,10,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(247,201,72,0.10) 0%, transparent 50%);
      pointer-events: none;
    }
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }
    .login-card {
      background: white;
      border: 2px solid var(--ink);
      border-radius: 2px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: 8px 8px 0 var(--ink);
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-mark {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border: 2px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      color: white;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 2px;
      padding: 12px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--ink);
      background: var(--surface);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 3px 3px 0 var(--accent);
      background: white;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--ink);
      color: white;
      border: 2px solid var(--ink);
      border-radius: 2px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
      position: relative;
    }
    .btn-login:hover { background: var(--accent); border-color: var(--accent); box-shadow: 3px 3px 0 var(--ink); transform: translate(-1px,-1px); }
    .btn-login:active { transform: translate(1px,1px); box-shadow: none; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .error-msg {
      background: #fff0ed;
      border: 1.5px solid var(--accent);
      border-radius: 2px;
      padding: 10px 14px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }
    .hint {
      margin-top: 20px;
      padding: 12px;
      background: #fffbf0;
      border: 1.5px solid var(--accent-2);
      border-radius: 2px;
      font-size: 12px;
      color: var(--muted);
    }
    .hint code { font-family: 'DM Mono', monospace; color: var(--ink); font-weight: 500; }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="login-card">
    <div class="logo-mark">TT</div>
    <h1>Toner Tracker</h1>
    <p class="subtitle">Inventory Management System — Sign in to continue</p>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In →</button>

    <div class="hint">
      Demo credentials: <code>admin</code> / <code>admin123</code>
    </div>
  </div>

  <script>
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const errDiv = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errDiv.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/';
        } else {
          showError(data.error || 'Login failed. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Sign In →';
        }
      } catch {
        showError('Connection error. Please check the server.');
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    // Check if already logged in
    fetch('/api/me').then(r => { if (r.ok) window.location.href = '/'; });
  </script>
</body>
</html>
